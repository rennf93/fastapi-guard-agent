name: Publish legacy shim to PyPI

# One-shot workflow to publish the `fastapi-guard-agent` meta-package (shim)
# that transitively installs `guard-agent`. Triggered manually after the
# main `guard-agent` release has been published and verified.
#
# NOTE: Re-running this workflow will fail unless the shim version in
# `shim/pyproject.toml` is bumped (PyPI rejects re-uploading the same version).

on:
  workflow_dispatch:

jobs:
  publish-shim:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build shim package
        working-directory: shim
        run: |
          python -m build

      - name: Publish shim to PyPI
        working-directory: shim
        env:
          TWINE_USERNAME: ${{ secrets.TWINE_USERNAME }}
          TWINE_PASSWORD: ${{ secrets.TWINE_PASSWORD }}
        run: |
          twine upload dist/*

      - name: Notify Slack
        if: always()
        uses: rennf93/good-comms@master
        with:
          SLACK_WEBHOOK: '${{ secrets.SLACK_WEBHOOK }}'
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
          STATUS: ${{ job.status == 'success' && 'Success' || 'Failed' }}
          CHANNEL_ID: '${{ secrets.SLACK_CHANNEL }}'
          AUTHOR_NAME: 'Guard Agent - Legacy Shim Release'
          AUTHOR_LINK: 'https://github.com/rennf93/guard-agent'
          AUTHOR_ICON: ':package:'
          TITLE: 'fastapi-guard-agent shim (1.2.0) publish'
          TITLE_LINK: 'https://pypi.org/project/fastapi-guard-agent/'
          MESSAGE: |
            .
            The `fastapi-guard-agent` meta-package build has finished.

            Status: ${{ job.status }}
            .
          COLOR: ${{ job.status == 'success' && 'good' || 'danger' }}
